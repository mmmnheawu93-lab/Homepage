<!DOCTYPE html>
<html lang="ko">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scal=1.0">
 <title>드롭다운 실습</title>
</head>
<body>
    <h2>회원가입 - 거주지역 선택</h2>
    <form>
        <label for="region">거주 지역:</label>
        <select id="region" name="region">
            <option value="">-- 지역을 선택하세요 --</option>
            <optiongroup>
                <option value="seoul">서울특별시</option>
                <option value="busan">부산광역시</option>
                <option value="daegu">대구광역시</option>
                <option value="incheon">인천광역시</option>
                <option value="gwangju">광주광역시</option>
                <option value="daejeon">대전광역시</option>
                <option value="ulsan">울산광역시</option>
            </optiongroup>
            <optgroup label="도/지역">
                <option value="gueonggi">경기도</option>
                <option value="gangwon">강원도</option>
                <option value="chungbuk">충청북도</option>
                <option value="cungnam">충청남도</option>
            </optgroup>
 </select>
 <br/><br/>
 <label for="interest"> 관심분야(복수선택) </label>
 <select in="interest" name="interest" multiple size="5">
    <optiongroup label="당신이 잘하는 기술?">
        <option value="web1">웹개발1</option>
        <option value="web2">웹개발2</option>
        <option value="web3">웹개발3</option>
        <option value="web4">웹개발4</option>
        <option value="web5">웹개발5</option>
        <option value="web6">웹개발6</option>
        <option value="web7">웹개발7</option>
    </optiongroup>
 </select>
 <p><small>Ctrl(Cmd)+클릭으로 여러 항목을 선택할 수 있습니다.</small></p>
<div>
    <h3>문의내용: </h3>
    <label>문의할 사항</label>
    <textarea name="inquiry" rows="5" cols="80" placeholder="자유롭게 문의하실 부분을 작성해 주세요"></textarea>
</div>
 <button type="submit">전송</button>
 </form>
</body>
</html>
