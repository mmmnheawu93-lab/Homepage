<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Float vs Flexbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>기존 방법 (Float)</h2>
<div class="old-container">
  <div class="old-box">박스 1</div>
  <div class="old-box">박스 2</div>
  <div class="old-box">박스 3</div>
</div>

<h2>새로운 방법 (Flexbox)</h2>
<div class="new-container">
  <div class="new-box">박스 1</div>
  <div class="new-box">박스 2</div>
  <div class="new-box">박스 3</div>
  <div class="new-box">박스 4</div>
  <div class="new-box">박스 5</div>
  <div class="new-box">박스 6</div>
</div>

</body>
</html>
