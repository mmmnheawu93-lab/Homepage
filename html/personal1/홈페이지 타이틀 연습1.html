<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 1차 팀 프로젝트 홈페이지 타이틀 연습1.html </title>
    <link rel="stylesheet" href="../../CSS/CSS/홈페이지 타이틀 연습1.css">
</head>
<body>
    <section class="page s1">
        <div class="content-box">
            <h2> [슬라이드: AI 애니메이션 제작 워크플로우] </h2>
            <ul>
                <li> 
                    <strong> 기획 & 스토리: 주제선정, 세계관 구체화, 프롬프트 설계</strong>
                </li>
                <li>
                    <strong>시각화:</strong> 캐릭터 및 배경 에셋 생성 (지브리풍 톤앤매너
                    확립).
                </li>
                    <strong>영상화:</strong> 생성된 정지 이미지를 동적인 영상(Flow)으로
                    변환.
                </li>
                <li>
                    <strong>편집 & 사운드:</strong> 컷 편집, 영상 리듬 정리, 내레이션 및
                    효과음 보강.
                </li>
                <li>
                    <strong>최종 완성:</strong> 디테일 보정, 전체 퀄리티 조정 및 종합
                    렌더링.
                </li>
            </ul>
        </div>
    </section>

    </section>
    <section class="page s2">
        <div class="roadmap-container">
            <div class="roadmap-text title-text">AI워크플로우</div>
                <div class="roadmap-text step1">기획스토리</div>
                <div class="roadmap-text step2">시각화</div>
                <div class="roadmap-text step3">영상화</div>
                <div class="roadmap-text step4">편집</div>
                <div class="roadmap-text step5">사운드</div>
                <div class="roadmap-text step6">완성</div>
            </div>
        </section>
    <section class="page 2">3</section>
    <section class="page 3">4</section>
    <section class="page 4">5</section>
    <section class="page 5">6</section>
    <section class="page 6">7</section>
    <section class="page 7">8</section>
    <section class="page video-page">
        <video class="bg-video" id="myvideo/mp4">
            <source src="../../video/0330(1).mp4"
            type="video/mp4">
        </video>
        <div class="video-controls">
            <button id="playBtn"> ▶play </button>
            <button id="pauseBtn"> ⏸pause </button>
            <button id="replayBtn"> 🔁replay </button>
        </div>
    </section>
    <script>
    // 1. 비디오 정확한 ID로 가져오기
    const video = document.getElementById('myvideo/mp4');

    // 2. play 버튼 누르면 재생
    document.getElementById('playBtn').addEventListener('click', () => {
        video.play();
    });

    // 3. pause 버튼 누르면 일시정지
    document.getElementById('pauseBtn').addEventListener('click', () => {
        video.pause();
    });

    // 4. replay 버튼 누르면 처음(0초)으로 돌리고 다시 재생
    document.getElementById('replayBtn').addEventListener('click', () => {
        video.currentTime = 0;
        video.play();
    });
</script>
</body>
</html>
