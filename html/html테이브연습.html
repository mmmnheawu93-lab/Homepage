<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블연습</title>
    <style>
        table{
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
        }
        th, td{
            border: 2px dashed #ddd;
            padding: 12px;
            text-align: center;
        }
        th{
            background: #f5d8ee;
            color:  #adffe4;
            font-weight: 700;
        }
        tr:nth-child(odd) {
            background: rgba(112, 255, 248, 0.667);
        }
        th:nth-last-child{
            background-color: rgb(254, 255, 165);
        }
        tr:hover{
            background-color: #baff8c;
        }

</style>
</head>
