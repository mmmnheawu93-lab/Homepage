<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관계 선택자 연습</title>
    <style>
        /* 1. ul의 기본 여백을 제거하여 왼쪽으로 완전히 밀착 */
    nav ul {
        padding: 0;
        margin: 0;
    }

    /* 2. 모든 li 태그의 불릿 기호 제거 및 약간의 패딩 */
    nav li { 
        list-style: none; 
        padding: 5px; 
    }
    
    /* 3. 최상위 메뉴(홈, 서비스, 연락처)에만 배경색 지정 */
    nav > ul > li { 
        background-color: aquamarine; 
        margin: 2px; 
    }
    
    /* 4. h2 바로 뒤에 오는 첫 번째 p 태그 */
    h2 + p { 
        color: #ffabc4; 
        font-weight: 600; 
        font-size: 2rem; 
    }
    
    /* 5. h2 뒤에 오는 모든 p 태그 */
    h2 ~ p { 
        margin-left: 20px; 
    }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>홈</li>
            <li>서비스
                <ul>
                    <li>웹개발</li>
                    <li>앱개발</li>
                </ul>
            </li> <li>연락처</li>
        </ul>
    </nav>

    <h2>관계 선택자란?</h2>
    <p>이 문단은 h2 바로 다음에 있어서 파란색으로 표시됩니다.</p>
    <p>이 문단은 h2 이후에 있어서 왼쪽 여백이 있습니다.</p>
    <div>중간에 다른 요소</div>
    <p>이 문단도 h2 이후에 있어서 왼쪽 여백이 있습니다.</p>
</body>
</html>
